openapi: 3.0.3
info:
  title: distrebute.com Platform API
  version: 0.1.0
  description: |
    Unified API surface for distrebute.com — the 22 UI templates wired to
    backend services. Every endpoint is owned by exactly one microservice
    (see `x-owner` extension). Gateway routes path prefixes to services.

    Auth model: short-lived JWT access tokens (15 min) + opaque refresh
    tokens via the auth-service. Passkey / WebAuthn primary, password fallback.
  contact:
    name: distrebute.com platform team
    email: api@distrebute.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local docker-compose gateway
  - url: https://api.distrebute.com/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Sign-in, passkeys, 2FA, sessions (auth-service)
  - name: users
    description: Profiles, preferences, kids mode, devices (user-service)
  - name: metadata
    description: Titles, episodes, channels, creators (metadata-service)
  - name: video
    description: Playback URLs, transcoding, DRM (video-service)
  - name: recommendations
    description: Feed, rows, taste graph, explainability (recommendation-service)
  - name: search
    description: Hybrid people + content search (nlp-service)
  - name: translation
    description: Subtitles + auto-dub (translation-service)
  - name: ai
    description: Voice nav, summaries, smart digests (ai-service)
  - name: gamification
    description: Streaks, badges, XP, Wrapped (gamification-service)
  - name: moderation
    description: Reports, spam detection, sensitive blur (spam-service)
  - name: billing
    description: Memberships, tips, super chats, payouts (billing-service)
  - name: live
    description: Live streams, chat, polls, predictions (live-service)
  - name: social
    description: Comments, follows, watch parties (social-service)
  - name: notifications
    description: Push, email, digests, inbox (notification-service)
  - name: analytics
    description: Events, watch time, creator dashboard (analytics-service)

# =============================================================================
#  PATHS — grouped by service tag
# =============================================================================
paths:

  # ---- AUTH ----------------------------------------------------------------
  /auth/passkey/challenge:
    post:
      tags: [auth]
      summary: Start a passkey sign-in challenge (WebAuthn)
      x-owner: auth-service
      x-templates: [18]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasskeyChallengeRequest' }
      responses:
        '200':
          description: WebAuthn challenge
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PasskeyChallenge' }

  /auth/passkey/verify:
    post:
      tags: [auth]
      summary: Verify passkey assertion and issue tokens
      x-owner: auth-service
      x-templates: [18]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasskeyAssertion' }
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }

  /auth/sso/{provider}:
    post:
      tags: [auth]
      summary: SSO sign-in (apple, google, facebook)
      x-owner: auth-service
      x-templates: [18]
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, enum: [apple, google, facebook] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                idToken: { type: string }
                authCode: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }

  /auth/email/start:
    post:
      tags: [auth]
      summary: Send magic link / OTP to email
      x-owner: auth-service
      x-templates: [18]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '202': { description: Code sent }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange refresh token for a new access token
      x-owner: auth-service
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }

  /auth/2fa/setup:
    post:
      tags: [auth]
      summary: Begin TOTP enrollment, returns QR + secret
      x-owner: auth-service
      x-templates: [18]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrPngBase64: { type: string }
                  secret: { type: string }
                  recoveryCodes:
                    type: array
                    items: { type: string }

  /auth/2fa/verify:
    post:
      tags: [auth]
      summary: Verify TOTP code, enable 2FA
      x-owner: auth-service
      x-templates: [18]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string, example: "847291" }
      responses:
        '200': { description: 2FA enabled }

  /auth/security/health:
    get:
      tags: [auth]
      summary: Account security score + checklist
      x-owner: auth-service
      x-templates: [18]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SecurityHealth' }

  /auth/events:
    get:
      tags: [auth]
      summary: Recent sign-in events (success, blocked, suspicious)
      x-owner: auth-service
      x-templates: [18, 20]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SecurityEvent' }

  # ---- USERS, PROFILES, DEVICES, KIDS --------------------------------------

  /users/me:
    get:
      tags: [users]
      summary: Current user profile
      x-owner: user-service
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /users/me/profiles:
    get:
      tags: [users]
      summary: List family profiles (adult + kid)
      x-owner: user-service
      x-templates: [21]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Profile' }
    post:
      tags: [users]
      summary: Create a new profile
      x-owner: user-service
      x-templates: [21]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }

  /users/me/profiles/{profileId}/parental:
    put:
      tags: [users]
      summary: Update parental controls (age cap, screen time, schedule, categories)
      x-owner: user-service
      x-templates: [21]
      parameters:
        - in: path
          name: profileId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParentalControls' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParentalControls' }

  /users/me/pin:
    post:
      tags: [users]
      summary: Set household PIN to exit kid mode
      x-owner: user-service
      x-templates: [21]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pin: { type: string, minLength: 4, maxLength: 6 }
      responses:
        '204': { description: PIN set }

  /users/me/privacy:
    get:
      tags: [users]
      summary: Privacy toggle states (history, personalization, etc.)
      x-owner: user-service
      x-templates: [19]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivacySettings' }
    put:
      tags: [users]
      summary: Update privacy toggles
      x-owner: user-service
      x-templates: [19]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrivacySettings' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivacySettings' }

  /users/me/data-export:
    post:
      tags: [users]
      summary: Request full data export (GDPR/CCPA/DPDPA)
      x-owner: user-service
      x-templates: [19]
      responses:
        '202':
          description: Export queued; emailed when ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }
                  estimatedReadyAt: { type: string, format: date-time }

  /users/me/account:
    delete:
      tags: [users]
      summary: Delete account permanently (30-day grace)
      x-owner: user-service
      x-templates: [19]
      responses:
        '202': { description: Account scheduled for deletion }

  /users/me/devices:
    get:
      tags: [users]
      summary: All active sessions/devices
      x-owner: user-service
      x-templates: [20]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Device' }

  /users/me/devices/{deviceId}:
    delete:
      tags: [users]
      summary: Sign out a specific device
      x-owner: user-service
      x-templates: [20]
      parameters:
        - in: path
          name: deviceId
          required: true
          schema: { type: string }
      responses:
        '204': { description: Signed out }

  /users/me/devices/all:
    delete:
      tags: [users]
      summary: Sign out of all devices except current
      x-owner: user-service
      x-templates: [20]
      responses:
        '204': { description: All other devices signed out }

  /users/me/devices/{deviceId}/not-me:
    post:
      tags: [users]
      summary: Mark a sign-in attempt as fraudulent, trigger recovery flow
      x-owner: user-service
      x-templates: [20]
      parameters:
        - in: path
          name: deviceId
          required: true
          schema: { type: string }
      responses:
        '202': { description: Recovery flow initiated }

  # ---- METADATA: titles, episodes, channels --------------------------------

  /titles:
    get:
      tags: [metadata]
      summary: Browse titles (filter by genre, region, language)
      x-owner: metadata-service
      x-templates: [1, 3, 7, 16]
      parameters:
        - { in: query, name: genre, schema: { type: string } }
        - { in: query, name: region, schema: { type: string } }
        - { in: query, name: language, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: '#/components/schemas/Title' }
                  page: { type: integer }
                  total: { type: integer }

  /titles/{titleId}:
    get:
      tags: [metadata]
      summary: Title detail page (hero, synopsis, ratings, episodes)
      x-owner: metadata-service
      x-templates: [3]
      parameters:
        - in: path
          name: titleId
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TitleDetail' }

  /titles/{titleId}/episodes:
    get:
      tags: [metadata]
      summary: Episode list for a series
      x-owner: metadata-service
      x-templates: [3]
      parameters:
        - in: path
          name: titleId
          required: true
          schema: { type: string }
        - { in: query, name: season, schema: { type: integer } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Episode' }

  /channels/{channelId}:
    get:
      tags: [metadata]
      summary: Creator channel page (banner, featured, videos, about)
      x-owner: metadata-service
      x-templates: [4]
      parameters:
        - in: path
          name: channelId
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }

  /channels/{channelId}/videos:
    get:
      tags: [metadata]
      summary: Paginated videos for a channel
      x-owner: metadata-service
      x-templates: [4]
      parameters:
        - in: path
          name: channelId
          required: true
          schema: { type: string }
        - { in: query, name: sort, schema: { type: string, enum: [recent, popular, oldest] } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VideoCard' }

  /videos/{videoId}:
    get:
      tags: [metadata]
      summary: Video detail (title, byline, chapters, description)
      x-owner: metadata-service
      x-templates: [2]
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }

  # ---- VIDEO PLAYBACK ------------------------------------------------------

  /playback/{videoId}/manifest:
    get:
      tags: [video]
      summary: Get HLS/DASH manifest URL with signed DRM token
      x-owner: video-service
      x-templates: [2, 17]
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
        - { in: query, name: deviceType, schema: { type: string, enum: [phone, tablet, tv, web] } }
        - { in: query, name: drm, schema: { type: string, enum: [widevine, fairplay, playready] } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlaybackManifest' }

  /playback/{videoId}/heartbeat:
    post:
      tags: [video]
      summary: Report playback position (every 15s) for resume + analytics
      x-owner: video-service
      x-templates: [2, 17]
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                positionSec: { type: number }
                deviceId: { type: string }
                quality: { type: string }
                bufferEvents: { type: integer }
      responses:
        '204': { description: ack }

  /playback/handoff:
    post:
      tags: [video]
      summary: Move active playback session to a different device
      x-owner: video-service
      x-templates: [17]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fromDeviceId: { type: string }
                toDeviceId: { type: string }
                videoId: { type: string }
                positionSec: { type: number }
      responses:
        '200': { description: handoff complete }

  /playback/resume:
    get:
      tags: [video]
      summary: List of titles with resume position (Continue Watching row)
      x-owner: video-service
      x-templates: [1, 8]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ResumeItem' }

  # ---- RECOMMENDATIONS -----------------------------------------------------

  /feed/home:
    get:
      tags: [recommendations]
      summary: Personalized home rows for current user
      x-owner: recommendation-service
      x-templates: [1, 8]
      parameters:
        - { in: query, name: deviceType, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FeedRow' }

  /feed/shorts:
    get:
      tags: [recommendations]
      summary: Vertical shorts feed (For You / Subscribed / Live)
      x-owner: recommendation-service
      x-templates: [5]
      parameters:
        - { in: query, name: tab, schema: { type: string, enum: [for-you, subscribed, live] } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Short' }

  /feed/up-next/{videoId}:
    get:
      tags: [recommendations]
      summary: Up Next sidebar for a watching video
      x-owner: recommendation-service
      x-templates: [2]
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VideoCard' }

  /feed/why:
    get:
      tags: [recommendations]
      summary: Explainability for a recommendation (why am I seeing this)
      x-owner: recommendation-service
      x-templates: [15]
      parameters:
        - { in: query, name: videoId, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WhyRecommendation' }

  /feed/feedback:
    post:
      tags: [recommendations]
      summary: Not-interested / show-less-like-this signal
      x-owner: recommendation-service
      x-templates: [15]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                videoId: { type: string }
                action: { type: string, enum: [not_interested, mute_creator, more_like_this] }
      responses:
        '204': { description: signal recorded }

  /feed/preferences:
    get:
      tags: [recommendations]
      summary: Genre dial settings + discovery slider
      x-owner: recommendation-service
      x-templates: [15]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedPreferences' }
    put:
      tags: [recommendations]
      summary: Update genre dial / discovery slider
      x-owner: recommendation-service
      x-templates: [15]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeedPreferences' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedPreferences' }

  /taste-map:
    get:
      tags: [recommendations]
      summary: User's taste graph (genres, creators, moods, drift)
      x-owner: recommendation-service
      x-templates: [14]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TasteMap' }

  /feed/regional/{region}:
    get:
      tags: [recommendations]
      summary: Trending-in-region row (e.g. India, US)
      x-owner: recommendation-service
      x-templates: [16]
      parameters:
        - in: path
          name: region
          required: true
          schema: { type: string, example: "IN" }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/VideoCard' }

  /feed/cultural-calendar:
    get:
      tags: [recommendations]
      summary: Upcoming cultural events with themed collections
      x-owner: recommendation-service
      x-templates: [16]
      parameters:
        - { in: query, name: region, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CulturalEvent' }

  # ---- SEARCH --------------------------------------------------------------

  /search:
    get:
      tags: [search]
      summary: Mixed search across creators, titles, videos, live streams
      x-owner: nlp-service
      x-templates: [7]
      parameters:
        - { in: query, name: q, required: true, schema: { type: string } }
        - { in: query, name: type, schema: { type: string, enum: [all, creators, titles, videos, live, shorts] } }
        - { in: query, name: language, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResults' }

  /search/suggest:
    get:
      tags: [search]
      summary: Autocomplete suggestions
      x-owner: nlp-service
      x-templates: [7]
      parameters:
        - { in: query, name: q, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

  # ---- TRANSLATION / AUTO-DUB ---------------------------------------------

  /translation/languages:
    get:
      tags: [translation]
      summary: List supported languages for UI / CC / dub
      x-owner: translation-service
      x-templates: [16]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code: { type: string, example: "te" }
                    name: { type: string, example: "తెలుగు" }
                    supportsDub: { type: boolean }
                    supportsCC: { type: boolean }

  /translation/{videoId}/captions:
    get:
      tags: [translation]
      summary: WebVTT captions for a video
      x-owner: translation-service
      x-templates: [2, 16]
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
        - { in: query, name: language, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            text/vtt:
              schema: { type: string }

  /translation/{videoId}/dub:
    post:
      tags: [translation]
      summary: Request an auto-dub job for a target language
      x-owner: translation-service
      x-templates: [16]
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                targetLanguage: { type: string }
                preserveVoice: { type: boolean }
      responses:
        '202':
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }

  # ---- AI: voice nav, summaries, smart digests -----------------------------

  /ai/voice-command:
    post:
      tags: [ai]
      summary: Parse a voice command from TV remote ("play next episode")
      x-owner: ai-service
      x-templates: [17]
      requestBody:
        content:
          audio/wav:
            schema: { type: string, format: binary }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  intent: { type: string }
                  entities: { type: object }
                  action: { type: object }

  /ai/recap/{titleId}/{episodeId}:
    get:
      tags: [ai]
      summary: AI-generated recap of previous episodes
      x-owner: ai-service
      x-templates: [3]
      parameters:
        - { in: path, name: titleId, required: true, schema: { type: string } }
        - { in: path, name: episodeId, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  spokenAudioUrl: { type: string }
                  textSummary: { type: string }
                  durationSec: { type: integer }

  /ai/notifications/digest:
    get:
      tags: [ai]
      summary: Today's smart-personalized notification digest
      x-owner: ai-service
      x-templates: [15]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationDigest' }

  # ---- GAMIFICATION --------------------------------------------------------

  /gamification/me:
    get:
      tags: [gamification]
      summary: Current streak, XP, level, badges (Loyalty Hub)
      x-owner: gamification-service
      x-templates: [13]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GamificationProfile' }

  /gamification/wrapped/{year}:
    get:
      tags: [gamification]
      summary: Annual Year-in-Review (Wrapped)
      x-owner: gamification-service
      x-templates: [13]
      parameters:
        - in: path
          name: year
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WrappedReport' }

  /gamification/streak/check-in:
    post:
      tags: [gamification]
      summary: Trigger daily check-in (extends streak)
      x-owner: gamification-service
      x-templates: [13]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  streak: { type: integer }
                  xpEarned: { type: integer }
                  badgeUnlocked: { type: string, nullable: true }

  # ---- MODERATION / SAFETY -------------------------------------------------

  /moderation/report:
    post:
      tags: [moderation]
