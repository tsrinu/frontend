name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install all service deps + test deps
        run: |
          set -e
          for svc in gap-services/*/; do
            if [ -f "$svc/requirements.txt" ]; then
              pip install -q -r "$svc/requirements.txt"
            fi
          done
          pip install -q -r tests/requirements.txt

      - name: Lint with ruff
        run: ruff check gap-services/ tests/

      - name: Security scan (bandit)
        run: bandit -r gap-services/ -ll -i || true

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r gap-services/auth-service/requirements.txt || true

      - name: Run unit + integration tests
        env:
          JWT_KEY_DIR: /tmp/test-keys
          DEV_MODE: 'true'
        run: |
          mkdir -p /tmp/test-keys
          pytest tests/ -v --tb=short -m "not contract" || pytest tests/ -v --tb=short

      - name: OpenAPI lint
        run: |
          pip install -q openapi-spec-validator
          openapi-spec-validator openapi.yaml

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - billing-service
          - live-service
          - social-service
          - notification-service
          - analytics-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: gap-services/${{ matrix.service }}
          push: true
          tags: |
            top1p/distrebute-${{ matrix.service }}:latest
            top1p/distrebute-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: SSH deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/distrebute
            git pull
            docker compose -f docker-compose.yml -f docker-compose.gap.yml pull
            docker compose -f docker-compose.yml -f docker-compose.gap.yml up -d --remove-orphans
            docker system prune -f
